name: Verifactu Worker CI

on:
  push:
    branches: [main, master]
    paths:
      ['apps/verifactu-worker/**', 'libs/**', 'package.json', 'pnpm-lock.yaml']
  pull_request:
    branches: [main, master]
    paths:
      ['apps/verifactu-worker/**', 'libs/**', 'package.json', 'pnpm-lock.yaml']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec nx run verifactu-worker:build --configuration=production

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm exec nx run verifactu-worker:test
