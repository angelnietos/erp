name: Continuous Integration (Nx Affected)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive base and head for nx affected
        uses: nrwl/nx-set-shas@v4

      # Tests E2E/unitarios: fase aparte (ver docs/BACKLOG.md §7).
      - name: Lint affected
        run: pnpm exec nx affected -t lint --parallel=3

      - name: Build affected
        run: pnpm exec nx affected -t build --parallel=3
