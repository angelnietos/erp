name: Verifactu Worker CD

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build:verifactu-worker

      - name: Build Docker image
        run: docker build -t verifactu-worker-app -f Dockerfile.verifactu-worker . # Adjust Dockerfile path

      - name: Deploy to Railway
        run: |
          npm install -g @railway/cli
          railway login --token ${{ secrets.RAILWAY_TOKEN }}
          railway link --project verifactu-worker-project-id  # Replace with actual project ID
          docker tag verifactu-worker-app registry.railway.app/verifactu-worker-app
          docker push registry.railway.app/verifactu-worker-app
          railway up --detach
