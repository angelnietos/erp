name: Deploy — SSH (Ubuntu)

# Ejecutar tras publicar imágenes, o manualmente cuando el servidor ya tiene deploy/.env
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Rama o tag desplegado (informativo)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Definir estos secretos en el repo (Settings → Actions). Avisos "Context access might be invalid"
    # en el editor suelen ser falsos positivos hasta iniciar sesión en la extensión GitHub Actions y recargar.
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      GHCR_PULL_USER: ${{ secrets.GHCR_PULL_USER }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_PATH }}"
            if [ -n "${{ env.GHCR_PULL_TOKEN }}" ]; then
              echo "${{ env.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u "${{ env.GHCR_PULL_USER }}" --password-stdin
            fi
            set -a
            . deploy/.env
            set +a
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
