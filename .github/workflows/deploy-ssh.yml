name: Deploy — SSH (Ubuntu)

# Ejecutar tras publicar imágenes, o manualmente cuando el servidor ya tiene deploy/.env
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Rama o tag desplegado (informativo)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            if [ -n "${{ secrets.GHCR_PULL_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_PULL_USER }}" --password-stdin
            fi
            set -a
            . deploy/.env
            set +a
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
