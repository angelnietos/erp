<div class="page-header">
  <h1>Nuevo Presupuesto</h1>
  <ui-josanz-button (clicked)="onSubmit()" [icon]="Save" [disabled]="budgetForm.invalid || store.loading()" [loading]="store.loading()">
    Guardar Presupuesto
  </ui-josanz-button>
</div>

<div class="create-grid">
  <!-- Datos del Cliente -->
  <ui-josanz-card title="Información General">
    <form [formGroup]="budgetForm">
      <ui-josanz-select
        id="clientId"
        label="Seleccionar Cliente"
        placeholder="Busca un cliente..."
        [options]="clients() | selectMapper:'name':'id'"
        formControlName="clientId"
        [error]="!!(budgetForm.get('clientId')?.invalid && budgetForm.get('clientId')?.touched)"
      ></ui-josanz-select>
    </form>
  </ui-josanz-card>

  <!-- Líneas de Detalle -->
  <ui-josanz-card title="Líneas de Presupuesto">
    <div slot="header-actions">
      <ui-josanz-button (clicked)="addItem()" [icon]="Plus" variant="ghost">Agregar Línea</ui-josanz-button>
    </div>

    <div class="items-list" [formGroup]="budgetForm">
      <div formArrayName="items">
        @for (item of items.controls; track $index; let i = $index) {
          <div [formGroupName]="i" class="item-row animate-in">
            <div class="col-product">
              <ui-josanz-select
                label="Producto"
                placeholder="Seleccionar..."
                [options]="products() | selectMapper:'name':'id'"
                formControlName="productId"
                (change)="onProductChange(i)"
              ></ui-josanz-select>
            </div>
            <div class="col-qty">
              <ui-josanz-input type="number" label="Cant." formControlName="quantity"></ui-josanz-input>
            </div>
            <div class="col-price">
              <ui-josanz-input type="number" label="Precio" formControlName="price"></ui-josanz-input>
            </div>
            <div class="col-disc">
              <ui-josanz-input type="number" label="Dto. %" formControlName="discount"></ui-josanz-input>
            </div>
            <div class="col-tax">
              <ui-josanz-input type="number" label="IVA %" formControlName="tax"></ui-josanz-input>
            </div>
            <div class="col-remove">
              <button class="remove-btn" (click)="removeItem(i)">
                <i-lucide [name]="Trash2"></i-lucide>
              </button>
            </div>
          </div>
        } @empty {
          <div class="empty-items">No has añadido líneas de presupuesto</div>
        }
      </div>
    </div>

    <div footer class="budget-summary">
      <div class="summary-line">
        <span>Base Imponible:</span>
        <span class="value">{{ calculateSubtotal() | currency:'EUR' }}</span>
      </div>
      <div class="summary-line total">
        <span>Total (con IVA):</span>
        <span class="value">{{ calculateTotal() | currency:'EUR' }}</span>
      </div>
    </div>
  </ui-josanz-card>
</div>
