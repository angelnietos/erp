<div class="auth-wrapper">
  <lib-animated-background [theme]="backgroundTheme()"></lib-animated-background>

  <div class="auth-card glass">
    <div class="auth-header">
      <div class="logo-circle">
        <lucide-icon name="clapperboard" class="logo-icon"></lucide-icon>
      </div>
      <p class="brand-tag text-uppercase">Josanz Audiovisuales</p>
      <h1>Acceso ERP</h1>
      <p class="auth-sub">Plató listo. Entra al panel de producción.</p>
    </div>

    <!-- Theme Selector -->
    <div class="theme-selector-container">
      <div class="theme-label">
        <lucide-icon [name]="icons.Palette" size="14"></lucide-icon>
        <span>Estilo de Fondo</span>
      </div>
      <div class="theme-options">
        @for (t of themes; track t.id) {
          <button 
            type="button"
            class="theme-opt"
            [class.active]="backgroundTheme() === t.id"
            (click)="setBackgroundTheme(t.id)"
            [title]="t.name">
            <div class="theme-color-dot" [style.background]="t.color"></div>
            <lucide-icon [name]="t.icon" size="14"></lucide-icon>
          </button>
        }
      </div>
    </div>

    @if (store.error()) {
      <ui-josanz-alert type="error">
        {{ store.error() }}
      </ui-josanz-alert>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <ui-josanz-input
        id="email"
        label="E-mail"
        type="email"
        placeholder="Introduce tu e-mail"
        icon="user"
        formControlName="email"
        [error]="!!(loginForm.get('email')?.invalid && loginForm.get('email')?.touched)"
      ></ui-josanz-input>

      <ui-josanz-input
        id="password"
        label="Contraseña"
        type="password"
        placeholder="••••••••"
        icon="lock"
        formControlName="password"
        [error]="!!(loginForm.get('password')?.invalid && loginForm.get('password')?.touched)"
      ></ui-josanz-input>

      <ui-josanz-button 
        type="submit" 
        [loading]="store.loading()"
        [disabled]="loginForm.invalid"
        icon="arrow-right"
      >
        Acceder
      </ui-josanz-button>
    </form>

    <div class="auth-footer">
      <a href="javascript:void(0)">¿Olvidaste tu contraseña?</a>
    </div>
  </div>
</div>
