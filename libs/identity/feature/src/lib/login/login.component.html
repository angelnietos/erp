<div class="auth-wrapper">
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="auth-card glass">
    <div class="auth-header">
      <div class="logo-circle">
        <lucide-icon name="user" class="logo-icon"></lucide-icon>
      </div>
      <h1>Acceso ERP</h1>
      <p>Bienvenido. Por favor inicia sesión.</p>
    </div>

    @if (store.error()) {
      <ui-josanz-alert type="error">
        {{ store.error() }}
      </ui-josanz-alert>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <ui-josanz-input
        id="email"
        label="E-mail"
        type="email"
        placeholder="Introduce tu e-mail"
        icon="user"
        formControlName="email"
        [error]="!!(loginForm.get('email')?.invalid && loginForm.get('email')?.touched)"
      ></ui-josanz-input>

      <ui-josanz-input
        id="password"
        label="Contraseña"
        type="password"
        placeholder="••••••••"
        icon="lock"
        formControlName="password"
        [error]="!!(loginForm.get('password')?.invalid && loginForm.get('password')?.touched)"
      ></ui-josanz-input>

      <ui-josanz-button 
        type="submit" 
        [loading]="store.loading()"
        [disabled]="loginForm.invalid"
        icon="arrow-right"
      >
        Acceder
      </ui-josanz-button>
    </form>

    <div class="auth-footer">
      <a href="javascript:void(0)">¿Olvidaste tu contraseña?</a>
    </div>
  </div>
</div>
