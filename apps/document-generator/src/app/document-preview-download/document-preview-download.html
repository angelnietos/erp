<div class="min-h-screen bg-secondary">
  <!-- Header -->
  <div class="bg-surface shadow-sm border-b border-soft">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center space-x-4">
          <button
            type="button"
            (click)="goBack()"
            class="inline-flex items-center px-3 py-2 text-sm font-medium text-primary bg-secondary border border-soft rounded-md hover:bg-tertiary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand"
          >
            <svg
              class="w-4 h-4 mr-2"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 19l-7-7 7-7"
              ></path>
            </svg>
            Volver a Vista Previa
          </button>
          <div>
            <h1 class="text-lg font-semibold text-primary">
              Vista Previa del PDF
            </h1>
            <p class="text-sm text-muted">{{ document?.title }}</p>
          </div>
        </div>

        <div class="flex items-center space-x-3">
          <button
            type="button"
            (click)="downloadPdf()"
            [disabled]="!pdfUrl || isGenerating"
            class="inline-flex items-center px-4 py-2 bg-success text-bg-secondary text-sm font-medium rounded-md hover:shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-success disabled:opacity-50"
          >
            <svg
              class="w-4 h-4 mr-2"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
              ></path>
            </svg>
            Descargar PDF
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="bg-surface rounded-lg shadow-lg overflow-hidden">
      <div class="p-6">
        <div class="aspect-[3/4] w-full">
          <div
            *ngIf="isGenerating"
            class="flex items-center justify-center h-full bg-tertiary rounded-lg"
          >
            <div class="text-center">
              <div
                class="animate-spin rounded-full h-12 w-12 border-b-2 border-brand mx-auto"
                aria-hidden="true"
              ></div>
              <p class="mt-4 text-secondary">Generando PDF...</p>
            </div>
          </div>

          <div
            *ngIf="pdfError && !isGenerating"
            class="flex items-center justify-center h-full bg-red-50 dark:bg-red-950/30 border border-red-200 dark:border-red-800 rounded-lg p-6"
            role="alert"
          >
            <p class="text-sm text-red-800 dark:text-red-200 text-center max-w-md">
              {{ pdfError }}
            </p>
          </div>

          <iframe
            *ngIf="pdfUrl && !isGenerating"
            [src]="pdfUrl"
            class="w-full h-full border-0 rounded-lg"
            title="PDF Preview"
          ></iframe>
        </div>
      </div>
    </div>
  </div>
</div>
