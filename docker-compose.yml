version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: josanz_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: josanz_erp
    ports:
      - '5435:5432'
    volumes:
      - josanz_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: josanz_erp_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  josanz_pgdata:
