# Producción: solo imágenes (build en CI). En servidor: pull + up.
#
#   export $(grep -v '^#' deploy/.env | xargs)
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Build local antes de subir a registry:
#   docker build -f docker/backend/Dockerfile -t josanz-backend:local .
#   docker build -f docker/frontend/Dockerfile -t josanz-frontend:local .
#   BACKEND_IMAGE=josanz-backend:local FRONTEND_IMAGE=josanz-frontend:local docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}
      POSTGRES_DB: ${POSTGRES_DB:-josanz_erp}
    volumes:
      - josanz_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE requerido (p. ej. ghcr.io/org/repo/backend:main)}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '3000'
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL requerido}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET requerido}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-${JWT_SECRET}}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    expose:
      - '3000'

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE requerido}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '${HTTP_PORT:-80}:80'

volumes:
  josanz_pgdata:
