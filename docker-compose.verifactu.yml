services:
  verifactu-postgres:
    image: postgres:16-alpine
    container_name: josanz_verifactu_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: verifactu_db
    ports:
      - '5437:5432'
    volumes:
      - josanz_verifactu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  verifactu-redis:
    image: redis:7-alpine
    container_name: josanz_verifactu_redis
    restart: unless-stopped
    ports:
      - '6380:6379'

volumes:
  josanz_verifactu_pgdata:

